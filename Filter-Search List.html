<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="C:/MCODES frontends/bootstrap and fontawesome/fontawesome-free-6.6.0-web/css/all.css">
      <title>Filter Search List</title>
      <style>
            * {
                  margin: 0;
            }
            #myInput {
                  width: 50%;
                  font-size: 16px;
                  padding: 15px 28px;
                  border: 1px solid #ddd;
                  margin: 12px 5px;
            }
            #myUl {
                  list-style-type: none;
                  padding: 0;
                  margin: 0;
            }
            #myUl li a {
                  border: 1px solid #ddd;
                  margin-top: -1px;
                  background-color: #f6f6f6;
                  padding: 16px;
                  text-decoration: none;
                  font-size: 18px;
                  color: black;
                  display: block;
            }
            #myUl li a:hover:not(.header) {
                  background-color: #eee;
            }
      </style>
</head>
<body>
      <input type="text" name="" id="myInput" onkeyup="myFunction()" placeholder="Search for names..">
      <ul id="myUl">
            <li><a href="#">Adles</a></li>
            <li><a href="#">Agnes</a></li>

            <li><a href="#">Billy</a></li>
            <li><a href="#">Bob</a></li>

            <li><a href="#">Calvin</a></li>
            <li><a href="#">Christan</a></li>
            <li><a href="#">Cindy</a></li>

            <li><a href="#">Doe</a></li>
            <li><a href="#">Dodge</a></li>
      </ul>

      <script>
            function myFunction() {
                  var input, filter, ul, li, a, i, txtValue;
                  input = document.getElementById('myInput');
                  filter = input.value.toUpperCase();
                  ul = document.getElementById("myUl");
                  li = ul.getElementsByTagName('li');

                  for(i = 0; i < li.length; i++) {
                        a = li[i].getElementsByTagName('a')[0];
                        txtValue = a.textContent || a.innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                              li[i].style.display = '';
                        } else {
                              li[i].style.display = 'None';
                        }
                  }
            }
      </script>
</body>
</html>
