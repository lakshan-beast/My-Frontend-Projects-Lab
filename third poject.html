<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>3rd-project | color flipper </title>
      <style>
            #color-displayer {
                  transition: background-color 1s;
            }
            section#color-display {
                  font-family:'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
                  margin: 100px auto;
                  padding: 4rem;
                  width: 50%;
                  background-color: rgb(212, 235, 255);
                  box-shadow: 10px 10px rgba(71, 71, 71, 0.5);
                  border-radius: 10px 0;
            }
            
            section#color-display {
                  font-weight: 900;
            }

            section#color-display #new-color-button {
                  width: 100%;
                  background-color: black;
                  color: white;
                  margin: 10px ;
                  padding: 1rem;
                  border-radius: 10px 0;
                  font-size: 1rem;
                  cursor: pointer;
                  border: none;
            }

            section#color-display #new-color-button:hover {
                  background-color: rgba(71, 71, 71, 0.5);
            }
            #color-displayer {
                  width: 275px;
                  height: 100px;
                  margin: 100px 0;
                  border: 1px solid transparent;
            }
      </style>
</head>
<body>
      <section id="color-display">
            <h1>
                  Background: <br><span id="current-color">#ffffff</span>
            </h1>
            <button id="new-color-button">New Color!</button>

            <!-- <div id="color-displayer"></div> -->
      </section>
      
      <script>
            const newColorbtnElement = document.getElementById('new-color-button');
            const currentColorElement = document.getElementById('current-color');

            const hexValues = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'A', 'B', 'C', 'D', 'E', 'F'];


            function getRandomHexValue() {
                  const randomIndexPosition = Math.floor(
                        Math.random() * hexValues.length
                  );

                  const randomHexValue = hexValues[randomIndexPosition];

                  return randomHexValue;
            };

            function getRandomHexString(stringLength) {
                  let hexString = '';
                  for (let i = 0; i < stringLength; i++) {
                        hexString += getRandomHexValue();
                  }

                  return hexString;
            }

            newColorbtnElement.addEventListener('click', () => {
                  const randomHexString = '#' + getRandomHexString(6);
                  
                  document.body.style.setProperty(
                        'background-color', 
                        randomHexString
                  );

                  currentColorElement.textContent = randomHexString;
            });



      </script>
</body>
</html>
